name: Release

on:
  push:
    tags:
      - "types-v*.*.*"
      - "server-v*.*.*"
      - "client-v*.*.*"
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to publish (types, server, or client)"
        required: true
        type: choice
        options:
          - types
          - server
          - client

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # id-token: write at job level ensures ACTIONS_ID_TOKEN_REQUEST_URL is set
    # for this job, enabling npm Trusted Publishers OIDC authentication.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # No registry-url: setup-node@v4 injects GITHUB_TOKEN as NODE_AUTH_TOKEN when
      # registry-url is set, which blocks npm's OIDC Trusted Publishers path.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine package
        id: pkg
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.package }}" ]; then
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF##refs/tags/}"
            case "$tag" in
              types-v*) echo "name=types" >> "$GITHUB_OUTPUT" ;;
              server-v*) echo "name=server" >> "$GITHUB_OUTPUT" ;;
              client-v*) echo "name=client" >> "$GITHUB_OUTPUT" ;;
              *) echo "Unrecognised tag $tag"; exit 1 ;;
            esac
          fi

      - name: Install
        run: bun install --frozen-lockfile

      # Build first so packages/types/dist/ exists before server tests
      # import "@opencall/types" (which resolves through the published
      # declaration files via the workspace symlink).
      - name: Build all workspaces (types before server — server depends on types)
        run: bun run build

      - name: Test
        run: bun test

      - name: Publish
        working-directory: packages/${{ steps.pkg.outputs.name }}
        run: |
          set -euo pipefail

          # npm 10.x (Node.js 22) lacks lib/utils/oidc.js (reworked in npm 11),
          # so the OIDC Trusted Publishers exchange never fires. Do it manually:

          # 1. Request GitHub OIDC token (audience scoped to npmjs.org)
          ID_TOKEN=$(curl -fsSL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm%3Aregistry.npmjs.org" \
            | jq -r '.value')

          # 2. Exchange with npm Trusted Publishers for a temporary publish token
          PKG_NAME=$(jq -r '.name' package.json)
          PKG_ESCAPED="${PKG_NAME/\//%2F}"
          EXCHANGE=$(curl -fsSL -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${PKG_ESCAPED}" \
            -H "Authorization: Bearer ${ID_TOKEN}")
          NPM_TOKEN=$(echo "${EXCHANGE}" | jq -r '.token // empty')
          [ -z "${NPM_TOKEN}" ] && { echo "OIDC exchange failed: ${EXCHANGE}"; exit 1; }

          # 3. Configure npm with the temporary token
          printf "registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=%s\n" \
            "${NPM_TOKEN}" > "${HOME}/.npmrc"

          # 4. Publish — --provenance uses sigstore's own OIDC flow independently
          npm publish --provenance --access public --no-workspaces
