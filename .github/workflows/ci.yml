name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Build first so packages/types/dist/ exists before server typechecks
      # against it (server imports from "@opencall/types" which resolves
      # through the workspace's published declaration files). The root
      # `build` script serialises types-then-server because Bun's
      # --filter='*' runs in parallel without topological awareness.
      - run: bun run build
      - run: bun run typecheck
      - run: bun test
